version: "3.9"

services:
  # ─── PostgreSQL (local dev fallback if not using Supabase) ────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: arth_postgres
    environment:
      POSTGRES_DB: arth_db
      POSTGRES_USER: arth_user
      POSTGRES_PASSWORD: arth_pass
    ports:
      - "5432:5432"
    volumes:
      - arth_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arth_user -d arth_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: arth_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://arth_user:arth_pass@postgres:5432/arth_db
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ─── React Frontend ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: arth_frontend
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  arth_pg_data:
