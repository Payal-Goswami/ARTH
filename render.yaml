services:
  - type: web
    name: arth-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: false
      - key: ALLOWED_ORIGINS
        value: https://arth-mu.vercel.app,http://localhost:5173,http://localhost:3000
